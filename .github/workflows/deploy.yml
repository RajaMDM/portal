name: Deploy Portal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # GitHub Pages project sites are served from /<repo-name>/
        # HashRouter + PORTAL_BASE means all asset paths and links work correctly.
        # No CNAME file is created — this stays on the GitHub Pages project URL
        # (https://RajaMDM.github.io/<repo-name>/) and does NOT touch trykarkedekho.com.
        env:
          PORTAL_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
